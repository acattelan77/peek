name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version metadata
        run: ./scripts/check-version.sh

      - name: Validate release-relevant version bump
        if: github.event_name == 'pull_request'
        run: ./scripts/check-version-bump.sh "${{ github.event.pull_request.base.sha }}"

      - name: Validate release-relevant version bump on push
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: ./scripts/check-version-bump.sh "${{ github.event.before }}"

      - name: Build (unsigned)
        run: |
          xcodebuild -scheme "Peek" -configuration Debug -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Test (unsigned)
        run: |
          xcodebuild -scheme "Peek" -destination "platform=macOS" -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" test
